name: Android TWA

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build signed artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build packages
        run: sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and component tests
        run: npm run test

      - name: Coverage
        run: npm run test:coverage

      - name: Build web app
        run: npm run build

      - name: Restore Android release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-twa/android-keystore

      - name: Build Android release outputs
        working-directory: android-twa
        run: ./gradlew assembleRelease bundleRelease

      - name: Sign Android artifacts
        working-directory: android-twa
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"

          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -n "$build_tools_dir"

          "$build_tools_dir/zipalign" -v -f -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app-release-unsigned-aligned.apk

          "$build_tools_dir/apksigner" sign \
            --ks ./android-keystore \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out app-release-signed.apk \
            app-release-unsigned-aligned.apk

          jarsigner \
            -keystore ./android-keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar app-release-bundle.aab \
            app/build/outputs/bundle/release/app-release.aab \
            "$ANDROID_KEY_ALIAS"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: treetales-release-apk
          path: android-twa/app-release-signed.apk
          if-no-files-found: error

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: treetales-release-aab
          path: android-twa/app-release-bundle.aab
          if-no-files-found: error
