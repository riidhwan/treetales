name: PR Quality Gate

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare report directory
        run: mkdir -p reports/vitest

      - name: Unit and component tests
        run: npm run test -- --reporter=default --reporter=junit --outputFile=reports/vitest/junit.xml

      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-junit-report
          path: reports/vitest/junit.xml
          if-no-files-found: ignore

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Coverage
        run: npm run test:coverage -- --coverage.reporter=json-summary --coverage.reporter=text-summary

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  report:
    name: required / quality gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit
      - coverage
      - build
    if: always()
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download report artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Publish quality gate summary
        if: always()
        run: |
          {
            echo "## PR Quality Gate"
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Lint | \`npm run lint\` | ${{ needs.lint.result }} |"
            echo "| Unit/component tests | \`npm run test\` | ${{ needs.unit.result }} |"
            echo "| Coverage | \`npm run test:coverage -- --coverage.reporter=json-summary --coverage.reporter=text-summary\` | ${{ needs.coverage.result }} |"
            echo "| Production build | \`npm run build\` | ${{ needs.build.result }} |"
            echo ""
            echo "Vitest and coverage reports are uploaded as workflow artifacts when present."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR test report
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_ARTIFACTS_DIR: artifacts
          LINT_OUTCOME: ${{ needs.lint.result }}
          UNIT_OUTCOME: ${{ needs.unit.result }}
          COVERAGE_OUTCOME: ${{ needs.coverage.result }}
          BUILD_OUTCOME: ${{ needs.build.result }}
        run: node scripts/github/comment-ci-report.mjs

      - name: Enforce required checks
        if: always()
        env:
          LINT_OUTCOME: ${{ needs.lint.result }}
          UNIT_OUTCOME: ${{ needs.unit.result }}
          COVERAGE_OUTCOME: ${{ needs.coverage.result }}
          BUILD_OUTCOME: ${{ needs.build.result }}
        run: |
          failed=0
          for name in LINT UNIT COVERAGE BUILD; do
            var="${name}_OUTCOME"
            result="${!var}"
            if [ "$result" != "success" ]; then
              echo "${name} finished with ${result}."
              failed=1
            fi
          done
          exit "$failed"
